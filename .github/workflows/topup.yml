name: Top up puzzle schedule

on:
  schedule:
    # Tuesdays 12:00 UTC — keeps the schedule at least 90 days ahead.
    - cron: '0 12 * * 2'
  workflow_dispatch:
    inputs:
      min_ahead:
        description: 'Top up when fewer than this many days remain (testing)'
        required: false
        default: '90'

permissions:
  contents: write
  actions: write   # to trigger the Pages deploy after committing

jobs:
  topup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate new puzzles with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MIN_AHEAD: ${{ github.event.inputs.min_ahead || '90' }}
        run: node scripts/topup-puzzles.mjs
      - name: Commit if changed
        run: |
          if ! git diff --quiet data/puzzles.json; then
            git config user.name "btown-brief-bot"
            git config user.email "actions@github.com"
            git add data/puzzles.json
            git commit -m "Top up puzzle schedule"
            git push
            # GITHUB_TOKEN pushes don't trigger the push-based deploy workflow,
            # so kick it explicitly or the live site never gets the new puzzles.
            gh workflow run deploy.yml --ref main
          else
            echo "Schedule already 90+ days ahead."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
