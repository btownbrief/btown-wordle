name: Top up puzzle schedule

on:
  schedule:
    # Tuesdays 12:00 UTC — keeps the schedule at least 90 days ahead.
    - cron: '0 12 * * 2'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  topup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate new puzzles with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/topup-puzzles.mjs
      - name: Commit if changed
        run: |
          if ! git diff --quiet data/puzzles.json; then
            git config user.name "btown-brief-bot"
            git config user.email "actions@github.com"
            git add data/puzzles.json
            git commit -m "Top up puzzle schedule"
            git push
          else
            echo "Schedule already 90+ days ahead."
          fi
